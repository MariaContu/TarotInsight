<div class="container">

    <h1>Tarot Insight</h1>

    <div class="filters">

    <div class="filter-group">
        <button (click)="selectedArcana='all'">Todos</button>
        <button (click)="selectedArcana='major'">Maiores</button>
        <button (click)="selectedArcana='minor'">Menores</button>
    </div>

    <div class="filter-group">
        <button (click)="selectedSuit='all'">Todos</button>
        <button [disabled]="selectedArcana === 'major'"  (click)="selectedSuit='cups'">Copas</button>
        <button [disabled]="selectedArcana === 'major'"  (click)="selectedSuit='swords'">Espadas</button>
        <button [disabled]="selectedArcana === 'major'"  (click)="selectedSuit='wands'">Paus</button>
        <button [disabled]="selectedArcana === 'major'"  (click)="selectedSuit='pentacles'">Ouros</button>
    </div>

    <div class="filter-group">
        <button (click)="selectedReading='general'">Geral</button>
        <button (click)="selectedReading='career'">Carreira</button>
        <button (click)="selectedReading='health'">Saúde</button>
        <button (click)="selectedReading='relationships'">Relacionamentos</button>
    </div>

</div>

    <button (click)="drawCard()">Tirar Carta</button>

    @if (selectedCard) {
        <app-card
            [card]="selectedCard"
            [isReversed]="isReversed"
            [readingType]="selectedReading">
        </app-card>
    }
</div>
