<div class="card-wrapper">
    <div 
        class="image"
        [class.inverted]="isInverted"
        (click)="toggleInvert()"
    >
        <img [src]="card.image" [alt]="card.name">
    </div>
    <div class="info">
        <h3>{{ card.name }}</h3>
        <p>{{ getMeaning() }}</p>
    </div>
</div>
